<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AuthFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white shadow-lg rounded-xl w-full max-w-md p-8">

        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-indigo-600">AuthFlow</h1>
            <p class="text-gray-500 mt-2">Reset your password</p>
        </div>

        <!-- Form -->
        <form>

            <!-- Email -->
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">
                    Email Address
                </label>
                <input
                    type="email"
                    placeholder="Enter your email"
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                >
            </div>

            <!-- Button -->
            <button
                type="submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition"
            >
                Send Reset Link
            </button>

        </form>

        <!-- Back to Login -->
        <div class="text-center mt-6">
            <a href="login.html" class="text-indigo-600 font-semibold hover:underline">
                Back to Login
            </a>
        </div>

    </div>

</body>
</html>
